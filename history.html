<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complaint History</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark px-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Complaint History</a>
        <div>
            <a href="index.html" class="btn btn-outline-light me-2">
                New Complaint
            </a>
            <a href="home.html" class="btn btn-outline-light">
                Logout
            </a>
        </div>
    </div>
</nav>

<div class="container mt-5">

    <div class="alert alert-info border-0 shadow-sm mb-5">
        <i class="bi bi-person-circle me-2"></i> Logged in as:
        <strong id="studentEmailDisplay" class="ms-1"></strong>
    </div>

    <div class="card p-4">
        <h2 class="mb-4 text-center">My Complaints</h2>

        <div class="table-responsive">
            <table class="table table-bordered table-striped mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>Department</th>
                        <th>Category</th>
                        <th>Complaint</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="historyTable">
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="history.js"></script>

</body>
</html>
