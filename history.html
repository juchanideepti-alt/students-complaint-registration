<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complaint History</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand">Complaint History</span>

        <div>
            <a href="index.html" class="btn btn-outline-light me-2">
                New Complaint
            </a>

            <a href="home.html" class="btn btn-outline-light">
                Logout
            </a>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <div class="alert alert-info">
        Logged in as:
        <strong id="studentEmailDisplay"></strong>
    </div>

    <h2 class="mb-4 text-center">My Complaints</h2>

    <table class="table table-bordered table-striped">
        <thead class="table-dark">
            <tr>
                <th>Department</th>
                <th>Category</th>
                <th>Complaint</th>
                <th>Status</th>
            </tr>
        </thead>

        <tbody id="historyTable">
        </tbody>

    </table>

</div>

<script src="history.js"></script>

</body>
</html>
