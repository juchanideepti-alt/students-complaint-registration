<!DOCTYPE html><html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body><nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand">Admin Dashboard</span>
        <a href="index.html" class="btn btn-outline-light">Logout</a>
    </div>
</nav><div class="container mt-4"><div class="row mb-4">
    <div class="col-md-4">
        <div class="card p-3 text-center">
            <h5>Total Complaints</h5>
            <h2 id="totalComplaints">0</h2>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card p-3 text-center">
            <h5>Pending</h5>
            <h2 id="pendingComplaints">0</h2>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card p-3 text-center">
            <h5>Resolved</h5>
            <h2 id="resolvedComplaints">0</h2>
        </div>
    </div>
</div>

<input
    type="text"
    id="searchInput"
    class="form-control mb-3"
    placeholder="Search complaints..."
    onkeyup="searchComplaints()">

<table class="table table-bordered table-striped">
    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Department</th>
            <th>Category</th>
            <th>Priority</th>
            <th>Complaint</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
    </thead>

    <tbody id="complaintList">
    </tbody>
</table>

</div><script src="admin.js"></script></body>
</html>
