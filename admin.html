<!DOCTYPE html><html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body><nav class="navbar navbar-expand-lg navbar-dark px-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Admin Dashboard</a>
        <a href="index.html" class="btn btn-outline-light">Logout</a>
    </div>
</nav><div class="container mt-5"><div class="row mb-4">
    <div class="col-md-4">
        <div class="card p-4 text-center">
            <h5 class="text-secondary mb-3 text-uppercase">Total Complaints</h5>
            <h2 id="totalComplaints" class="text-gradient display-5 fw-bold mb-0">0</h2>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card p-4 text-center">
            <h5 class="text-secondary mb-3 text-uppercase">Pending</h5>
            <h2 id="pendingComplaints" class="text-gradient display-5 fw-bold mb-0">0</h2>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card p-4 text-center">
            <h5 class="text-secondary mb-3 text-uppercase">Resolved</h5>
            <h2 id="resolvedComplaints" class="text-gradient display-5 fw-bold mb-0">0</h2>
        </div>
    </div>
</div>

<div class="row mb-4">
    <div class="col-md-6 offset-md-3">
        <div class="card p-4 text-center">
            <h5 class="text-secondary mb-3 text-uppercase">Complaints by Category</h5>
            <canvas id="categoryChart" style="max-height: 300px;"></canvas>
        </div>
    </div>
</div>

<div class="card p-4">

<div class="d-flex justify-content-between align-items-center mb-3">
    <input
        type="text"
        id="searchInput"
        class="form-control w-50"
        placeholder="Search complaints..."
        onkeyup="searchComplaints()">
    
    <button class="btn btn-success" onclick="exportToCSV()">
        <i class="bi bi-file-earmark-spreadsheet me-1"></i> Export to CSV
    </button>
</div>

<div class="table-responsive">
    <table class="table table-bordered table-striped mb-0">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Department</th>
                <th>Category</th>
                <th>Priority</th>
                <th>Complaint</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="complaintList">
        </tbody>
    </table>
</div>
</div>

</div>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="admin.js"></script>
</body>
</html>
