<!-- index.html (Student Complaint Form) -->

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark px-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Complaint Portal</a>
        <div>
            <a href="about.html" class="btn btn-outline-light me-2">About</a>
            <a href="contact.html" class="btn btn-outline-light me-2">Contact</a>
            <a href="history.html" class="btn btn-outline-light me-2">History</a>
            <a href="admin.html" class="btn btn-outline-light">Admin</a>
        </div>
    </div>
</nav>

<!-- Form Section -->
<div class="container mt-5 mb-5">
    <div class="card p-4 mx-auto" style="max-width: 600px;">
        <h2 class="text-center mb-4">Submit Complaint</h2>

        <form onsubmit="submitComplaint(event)">
            <div class="mb-3">
    <label class="form-label">Student Email</label>
    <input type="email"
           id="studentEmail"
           class="form-control"
           readonly>
</div>

            <div class="mb-3">
                <label class="form-label">Department</label>
                <input type="text" id="department" class="form-control" placeholder="Enter department">
            </div>
            <div class="mb-3">
    <label class="form-label">Category</label>
    <select id="category" class="form-control">
        <option value="">Select Category</option>
        <option value="Academic">Academic</option>
        <option value="Hostel">Hostel</option>
        <option value="Library">Library</option>
        <option value="Transport">Transport</option>
        <option value="Other">Other</option>
    </select>
</div>

            <div class="mb-3">
                <label class="form-label">Complaint</label>
                <textarea id="complaint" class="form-control" rows="4" placeholder="Enter complaint"></textarea>
            </div>
        
            <button type="submit" class="btn btn-primary w-100 mt-3">Submit</button>
        </form>
    </div>
</div>

<script src="script.js"></script>
<footer class="text-center p-4 mt-auto">
    <p class="mb-0 text-secondary">
        Student Complaint Registration System © 2026
    </p>
</footer>
</body>
</html>
