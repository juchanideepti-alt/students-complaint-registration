<!-- index.html (Student Complaint Form) -->

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand">Complaint Portal</span>

        <div>
            <a href="about.html" class="btn btn-outline-light me-2">About</a>
            <a href="contact.html" class="btn btn-outline-light me-2">Contact</a>
            <a href="history.html" class="btn btn-outline-light me-2">History</a>
            <a href="admin.html" class="btn btn-outline-light">Admin</a>
        </div>
    </div>
</nav>

<!-- Form Section -->
<div class="container mt-5">
    <div class="card shadow p-4">
        <h2 class="text-center mb-4">Submit Complaint</h2>

        <form onsubmit="submitComplaint(event)">
            <div class="mb-3">
                <label class="form-label">Student Name</label>
                <input type="text" id="name" class="form-control" placeholder="Enter your name">
            </div>

            <div class="mb-3">
                <label class="form-label">Department</label>
                <input type="text" id="department" class="form-control" placeholder="Enter department">
            </div>
            <div class="mb-3">
    <label class="form-label">Category</label>
    <select id="category" class="form-control">
        <option value="">Select Category</option>
        <option value="Academic">Academic</option>
        <option value="Hostel">Hostel</option>
        <option value="Library">Library</option>
        <option value="Transport">Transport</option>
        <option value="Other">Other</option>
    </select>
</div>

<div class="mb-3">
    <label class="form-label">Priority</label>
    <select id="priority" class="form-control">
        <option value="">Select Priority</option>
        <option value="Low">Low</option>
        <option value="Medium">Medium</option>
        <option value="High">High</option>
    </select>
</div>

            <div class="mb-3">
                <label class="form-label">Complaint</label>
                <textarea id="complaint" class="form-control" rows="4" placeholder="Enter complaint"></textarea>
            </div>
        
            <button type="submit" class="btn btn-primary w-100">Submit</button>
        </form>
    </div>
</div>

<script src="script.js"></script>
<footer class="bg-dark text-white text-center p-3 mt-5">
    <p class="mb-0">
        Student Complaint Registration System © 2026
    </p>
</footer>
</body>
</html>
